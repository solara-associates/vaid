# Conformance gate: the 8/8 conformance + byte-identical cross-language checks are
# the product claim, so we run them continuously on every push/PR to main.
# All actions are pinned to full commit SHAs (trailing tag comment for readability).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust conformance (cargo test --workspace)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust toolchain (pinned to rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.88"
      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

  python:
    name: Python conformance (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install vaid-pop + vaid-mint + vaid-langchain + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "./python/vaid-pop[test]"
          python -m pip install "./python/vaid-mint[test]"
          python -m pip install "./python/vaid-langchain[test]"
      - name: pytest conformance suite (vaid-pop + vaid-mint + vaid-langchain)
        run: python -m pytest python/vaid-pop python/vaid-mint python/vaid-langchain

  conformance-drift:
    name: PoP conformance drift-check (Rust == Python == vector, byte-identical)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # (a) The two vendored copies of the canonical vector MUST be byte-identical.
      # Each language test above only checks its OWN vendored copy; without this
      # cross-language cmp, drift between the Rust-side and Python-side vector goes
      # undetected. cmp exits non-zero (fails the job) on ANY byte difference.
      - name: Cross-language vector byte-identity (cmp)
        run: |
          cmp \
            crates/vaid-client/tests/vectors/operator_pop_v1.json \
            python/vaid-pop/vaid_pop/vectors/operator_pop_v1.json
      # (b) Re-run BOTH conformance suites against their vendored vectors so this
      # single job proves: Rust output == vector AND Python output == vector, and
      # (via the cmp above) the two vectors are the same bytes ⇒ Rust == Python.
      - name: Install Rust toolchain (pinned to rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.88"
      - name: Rust conformance gate (cargo test -p vaid-client --test conformance)
        run: cargo test -p vaid-client --test conformance --locked
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install vaid-pop + test deps
        run: python -m pip install --upgrade pip && python -m pip install "./python/vaid-pop[test]"
      - name: Python conformance gate (pytest)
        run: python -m pytest python/vaid-pop/tests/test_conformance.py

  mint-conformance-drift:
    name: Mint conformance drift-check (Rust == Python == vector, byte-identical)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # (a) The two vendored copies of the mint vector MUST be byte-identical.
      - name: Cross-language mint-vector byte-identity (cmp)
        run: |
          cmp \
            crates/vaid-mint/tests/vectors/mint_v1.json \
            python/vaid-mint/vaid_mint/vectors/mint_v1.json
      # (b) Re-run BOTH mint conformance gates against their vendored vectors:
      # Rust output == vector AND Python output == vector, and (via cmp) the two
      # vectors are the same bytes ⇒ Rust == Python. Self-consistent within this
      # repo (Decision B), not conformant against the closed VAID format.
      - name: Install Rust toolchain (pinned to rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.88"
      - name: Rust mint conformance gate (cargo test -p vaid-mint --test mint_conformance)
        run: cargo test -p vaid-mint --test mint_conformance --locked
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install vaid-pop + vaid-mint + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "./python/vaid-pop[test]"
          python -m pip install "./python/vaid-mint[test]"
      - name: Python mint conformance gate (pytest)
        run: python -m pytest python/vaid-mint/tests/test_mint_conformance.py

  pathquery-conformance-drift:
    name: Path-with-query drift-check (Rust == Python == vector, byte-identical)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # (a) The two vendored copies of the path-with-query vector MUST be identical.
      - name: Cross-language pathquery-vector byte-identity (cmp)
        run: |
          cmp \
            crates/vaid-client/tests/vectors/pathquery_v1.json \
            python/vaid-langchain/vaid_langchain/vectors/pathquery_v1.json
      # (b) Re-run BOTH gates against their vendored copies ⇒ Rust == Python ==
      # vector for the pinned path+query signing convention.
      - name: Install Rust toolchain (pinned to rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.88"
      - name: Rust pathquery conformance gate (cargo test -p vaid-client --test pathquery_conformance)
        run: cargo test -p vaid-client --test pathquery_conformance --locked
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install vaid-pop + vaid-langchain + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "./python/vaid-pop[test]"
          python -m pip install "./python/vaid-langchain[test]"
      - name: Python pathquery conformance gate (pytest)
        run: python -m pytest python/vaid-langchain/tests/test_path_convention.py
